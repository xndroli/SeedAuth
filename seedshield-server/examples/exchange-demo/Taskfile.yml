version: "3"

tasks:
  default:
    desc: Run the example
    cmd: bun run src/index.ts
    silent: true

  typecheck:
    cmd: bun run tsc --noEmit
    desc: Typecheck
    sources:
      - src/**/*.ts
      - tsconfig.json
      - package.json
      - ../../src/**/*

  test:
    cmd: bun run vitest run src/tests/e2e.test.ts
    desc: Run E2E tests
